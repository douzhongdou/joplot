    <script>
      (function applySeoLinks() {
        const origin = window.location.origin
        const links = [
          { rel: 'canonical', href: origin + '/en' },
          { rel: 'alternate', hreflang: 'en', href: origin + '/en' },
          { rel: 'alternate', hreflang: 'zh', href: origin + '/zh' },
          { rel: 'alternate', hreflang: 'ja', href: origin + '/ja' },
          { rel: 'alternate', hreflang: 'x-default', href: origin + '/' },
        ]

        for (const definition of links) {
          const link = document.createElement('link')
          link.rel = definition.rel
          link.href = definition.href

          if ('hreflang' in definition) {
            link.hreflang = definition.hreflang
          }

          document.head.appendChild(link)
        }
      })()
    </script>
