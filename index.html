<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="joplot is redirecting you to the right language version of the CSV charting workspace."
    />
    <meta name="author" content="joplot" />
    <meta name="robots" content="noindex, follow" />
    <meta name="theme-color" content="#155eef" />
    <meta name="application-name" content="joplot" />
    <meta name="apple-mobile-web-app-title" content="joplot" />
    <link rel="icon" type="image/svg+xml" href="/src/icon.svg" />
    <link rel="apple-touch-icon" href="/src/icon.svg" />
    <title>joplot | Redirecting to your language</title>
    <script>
      (function redirectToLanguage() {
        const language = (navigator.language || '').toLowerCase()
        const target = language.startsWith('zh')
          ? '/zh'
          : language.startsWith('ja')
            ? '/ja'
            : '/en'

        window.location.replace(target + window.location.search + window.location.hash)
      })()
    </script>
  </head>
  <body>
    <main>
      <p>Redirecting to the best language version for your browser.</p>
      <ul>
        <li><a href="/zh">中文</a></li>
        <li><a href="/en">English</a></li>
        <li><a href="/ja">日本語</a></li>
      </ul>
    </main>
  </body>
</html>
